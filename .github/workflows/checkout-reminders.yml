name: Automatic status cleanup

on:
  schedule:
    - cron: '13,43 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  call-auto-status-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger automatic status cleanup cron API
        run: |
          curl --fail --show-error --silent --max-time 25 --retry 2 --retry-all-errors \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$AUTO_STATUS_CLEANUP_URL"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AUTO_STATUS_CLEANUP_URL: https://workville.site/api/cron/checkout-reminders
