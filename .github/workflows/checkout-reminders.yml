name: Checkout reminders

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  call-checkout-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger checkout reminder cron API
        run: |
          curl --fail --show-error --silent --max-time 25 --retry 2 --retry-all-errors \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$CHECKOUT_REMINDERS_URL"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CHECKOUT_REMINDERS_URL: https://workville.site/api/cron/checkout-reminders
